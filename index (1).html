<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Silviana & George</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      min-height: 100svh;
    }

    body {
      background: #111010;
      color: #f0ede8;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* Subtle vignette — darkens edges like in screenshot */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 120% 100% at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Top bar ── */
    .topbar {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: flex-end;
      padding: 28px 28px 0;
      animation: fadeIn 1s ease 0.1s both;
    }

    .lang {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: rgba(240,237,232,0.5);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .lang span.active {
      color: #f0ede8;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .lang .sep {
      opacity: 0.3;
      font-size: 13px;
    }

    /* ── Center hero ── */
    .hero {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 28px;
      text-align: center;
    }

    .share-label {
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(240,237,232,0.45);
      margin-bottom: 28px;
      animation: fadeIn 1s ease 0.3s both;
    }

    .names {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(58px, 16vw, 88px);
      line-height: 1;
      color: #f0ede8;
      letter-spacing: -0.01em;
      animation: fadeIn 1s ease 0.45s both;
    }

    .date {
      margin-top: 18px;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(240,237,232,0.45);
      animation: fadeIn 1s ease 0.6s both;
    }

    /* small diamond */
    .diamond {
      margin-top: 32px;
      font-size: 13px;
      color: rgba(240,237,232,0.25);
      letter-spacing: 0.3em;
      animation: fadeIn 1s ease 0.7s both;
    }

    /* ── Bottom buttons ── */
    .btn-section {
      position: relative;
      z-index: 1;
      padding: 0 24px 48px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeIn 1s ease 0.85s both;
    }

    .btn {
      width: 100%;
      padding: 22px 24px;
      border: 1px solid rgba(240,237,232,0.3);
      border-radius: 1px;
      background: transparent;
      color: #f0ede8;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      transition: background 0.3s ease, border-color 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active,
    .btn:hover {
      background: rgba(240,237,232,0.07);
      border-color: rgba(240,237,232,0.65);
    }

    .btn svg {
      opacity: 0.65;
      flex-shrink: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-height: 680px) {
      .btn { padding: 16px 24px; }
      .share-label { margin-bottom: 16px; }
      .diamond { margin-top: 20px; }
    }
  </style>
</head>
<body>

  <!-- Top language bar (decorativ, ca în screenshot) -->
  <div class="topbar">
    <div class="lang">
      <span class="active">RO</span>
      <span class="sep">|</span>
      <span>EN</span>
    </div>
  </div>

  <!-- Hero centrat -->
  <div class="hero">
    <span class="share-label">Share the love</span>

    <h1 class="names">
      Silviana<br/>&amp; George
    </h1>

    <p class="date">22 August 2026</p>

    <div class="diamond">✦</div>
  </div>

  <!-- Butoane jos -->
  <div class="btn-section">
    <a class="btn" href="upload.html">
      <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
        <path d="M8.5 11.5V3.5M8.5 3.5L5 7M8.5 3.5L12 7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 12.5V14.5H15V12.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Încarcă foto &amp; video
    </a>

    <a class="btn" href="album.html">
      <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
        <rect x="2" y="2.5" width="13" height="11" rx="1" stroke="currentColor" stroke-width="1.2"/>
        <path d="M2 11L5 8L7.5 10.5L10.5 7L15 11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="6" cy="6" r="1.3" stroke="currentColor" stroke-width="1.2"/>
      </svg>
      Vezi albumul
    </a>
  </div>

</body>
</html>
