<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Silviana & George — Album</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #faf9f7;
      color: #1a1a18;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100svh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 48px 24px 0;
      animation: fadeIn 0.8s ease both;
    }

    .names {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(40px, 10vw, 64px);
      line-height: 1;
      color: #1a1a18;
      letter-spacing: -0.01em;
    }

    .album-subtitle {
      margin-top: 10px;
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #a8a8a2;
    }

    /* Diamond divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0;
      margin: 24px auto 0;
      max-width: 360px;
      padding: 0 24px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: #d8d8d2;
    }

    .divider-diamond {
      font-size: 10px;
      color: #c0c0b8;
      padding: 0 12px;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px 24px 0;
      animation: fadeIn 0.8s ease 0.2s both;
    }

    .btn-upload {
      padding: 14px 28px;
      border: 1px solid #1a1a18;
      border-radius: 1px;
      background: transparent;
      color: #1a1a18;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-upload:hover { background: rgba(26,26,24,0.05); }
    .btn-upload svg { opacity: 0.7; }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #6b6b65;
      padding: 14px 0;
    }

    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #7db87d;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Filter pills */
    .filters {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 16px 24px 0;
    }

    .filter-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #a8a8a2;
      background: none;
      border: 1px solid #e0e0d8;
      border-radius: 1px;
      padding: 7px 16px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .filter-btn.active,
    .filter-btn:hover {
      color: #1a1a18;
      border-color: #1a1a18;
    }

    /* ── Skeleton ── */
    #loading {
      padding: 24px;
      columns: 3;
      column-gap: 10px;
    }

    @media (max-width: 480px) { #loading { columns: 2; } }

    .skeleton {
      break-inside: avoid;
      margin-bottom: 10px;
      border-radius: 1px;
      background: linear-gradient(90deg, #f0efe9 25%, #e8e8e0 50%, #f0efe9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }

    .skeleton:nth-child(1) { aspect-ratio: 1; }
    .skeleton:nth-child(2) { aspect-ratio: 4/5; }
    .skeleton:nth-child(3) { aspect-ratio: 3/4; }
    .skeleton:nth-child(4) { aspect-ratio: 4/3; }
    .skeleton:nth-child(5) { aspect-ratio: 1; }
    .skeleton:nth-child(6) { aspect-ratio: 3/4; }

    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }

    /* ── Gallery ── */
    #gallery {
      padding: 24px 16px 80px;
      columns: 3;
      column-gap: 8px;
    }

    @media (max-width: 600px) { #gallery { columns: 2; } }
    @media (max-width: 380px) { #gallery { columns: 2; padding: 16px 12px 80px; } }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 8px;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      border-radius: 1px;
      background: #f0efe9;
      animation: fadeIn 0.5s ease both;
    }

    .gallery-item img,
    .gallery-item video {
      width: 100%; height: auto;
      display: block;
      transition: transform 0.5s ease;
    }

    .gallery-item:hover img,
    .gallery-item:hover video { transform: scale(1.04); }

    .item-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(26,26,24,0.45) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex; flex-direction: column;
      justify-content: flex-end;
      padding: 12px;
    }

    .gallery-item:hover .item-overlay { opacity: 1; }

    .item-name {
      color: white; font-size: 11px; letter-spacing: 0.06em;
    }

    .item-date {
      color: rgba(255,255,255,0.55); font-size: 10px; margin-top: 2px;
    }

    .play-btn {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 38px; height: 38px;
      background: rgba(250,249,247,0.9);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.3s ease;
    }

    .gallery-item:hover .play-btn { transform: translate(-50%, -50%) scale(1.1); }
    .play-btn svg { margin-left: 2px; }

    /* ── Empty state ── */
    #empty-state {
      display: none;
      text-align: center;
      padding: 64px 24px;
    }

    .empty-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 26px;
      font-weight: 300;
      color: #c0c0b8;
      line-height: 1.4;
    }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed; inset: 0;
      background: rgba(10,10,10,0.97);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #lightbox.open { display: flex; animation: fadeIn 0.2s ease; }

    #lb-media-wrap {
      max-width: min(92vw, 1000px);
      max-height: 85svh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #lb-media-wrap img,
    #lb-media-wrap video {
      max-width: 100%;
      max-height: 85svh;
      object-fit: contain;
      border-radius: 1px;
    }

    .lb-close {
      position: absolute; top: 20px; right: 20px;
      background: none; border: none;
      color: rgba(255,255,255,0.5);
      font-size: 26px; cursor: pointer;
      transition: color 0.2s;
    }

    .lb-close:hover { color: white; }

    .lb-nav {
      position: absolute; top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.07);
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 22px;
      cursor: pointer;
      padding: 16px 12px;
      border-radius: 1px;
      transition: background 0.2s, color 0.2s;
    }

    .lb-nav:hover { background: rgba(255,255,255,0.14); color: white; }
    #lb-prev { left: 16px; }
    #lb-next { right: 16px; }

    #lb-info {
      position: absolute; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    #lb-uploader { color: rgba(255,255,255,0.75); font-size: 12px; letter-spacing: 0.08em; }
    #lb-counter  { color: rgba(255,255,255,0.35); font-size: 10px; letter-spacing: 0.12em; margin-top: 4px; }

    @media (max-width: 480px) { .lb-nav { display: none; } }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <h1 class="names">Silviana &amp; George</h1>
    <p class="album-subtitle">Albumul nunții &nbsp;—&nbsp; 22 August 2026</p>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-diamond">✦</span>
      <div class="divider-line"></div>
    </div>
  </header>

  <div class="controls">
    <a class="btn-upload" href="upload.html">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <path d="M7.5 10V2M7.5 2L4.5 5M7.5 2L10.5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M1.5 11V13.5H13.5V11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Încarcă
    </a>
    <div class="live-badge">
      <div class="live-dot"></div>
      Live
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Toate</button>
    <button class="filter-btn" data-filter="image">Foto</button>
    <button class="filter-btn" data-filter="video">Video</button>
  </div>

  <div id="loading">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

  <div id="gallery"></div>

  <div id="empty-state">
    <p class="empty-text">Albumul este încă gol —<br/>fii primul care adaugă o amintire</p>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" role="dialog" aria-modal="true">
    <button class="lb-close" id="lb-close">&times;</button>
    <button class="lb-nav" id="lb-prev">&#8592;</button>
    <div id="lb-media-wrap"></div>
    <button class="lb-nav" id="lb-next">&#8594;</button>
    <div id="lb-info">
      <div id="lb-uploader"></div>
      <div id="lb-counter"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL     = 'https://tkjgsuiocutuiuwxxinc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRramdzdWlvY3V0dWl1d3h4aW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyODM4MTQsImV4cCI6MjA5Mjg1OTgxNH0.0gC8II_ABFmJf17_30YE7Gu6jSsd7-lkNdU8oHjGKU0';
    const SUPABASE_TABLE   = 'wedding_photos';

    const gallery    = document.getElementById('gallery');
    const loading    = document.getElementById('loading');
    const emptyState = document.getElementById('empty-state');
    const lightbox   = document.getElementById('lightbox');
    const lbWrap     = document.getElementById('lb-media-wrap');
    const lbUploader = document.getElementById('lb-uploader');
    const lbCounter  = document.getElementById('lb-counter');

    let allItems = [], filteredItems = [], currentIdx = 0;

    async function fetchPhotos() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?order=uploaded_at.desc&select=*`, {
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        if (!res.ok) throw new Error();
        return await res.json();
      } catch { return []; }
    }

    function renderGallery(items) {
      gallery.innerHTML = '';
      if (!items.length) { emptyState.style.display = 'block'; return; }
      emptyState.style.display = 'none';

      items.forEach((item, idx) => {
        const isVideo = item.resource_type === 'video';
        const div = document.createElement('div');
        div.className = 'gallery-item';
        div.style.animationDelay = `${(idx % 9) * 0.05}s`;

        if (isVideo) {
          const thumb = item.url.replace('/upload/', '/upload/w_600,q_auto,f_jpg/so_0/').replace(/\.(mp4|mov|webm)$/i, '.jpg');
          div.innerHTML = `
            <img src="${thumb}" alt="Video" loading="lazy"/>
            <div class="play-btn"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4 2.5L11 7L4 11.5V2.5Z" fill="#1a1a18"/></svg></div>
            <div class="item-overlay">
              <div class="item-name">${esc(item.uploader_name || 'Anonim')}</div>
              <div class="item-date">${fmtDate(item.uploaded_at)}</div>
            </div>`;
        } else {
          const imgUrl = item.url.replace('/upload/', '/upload/w_800,q_auto,f_auto/');
          div.innerHTML = `
            <img src="${imgUrl}" alt="Foto" loading="lazy"/>
            <div class="item-overlay">
              <div class="item-name">${esc(item.uploader_name || 'Anonim')}</div>
              <div class="item-date">${fmtDate(item.uploaded_at)}</div>
            </div>`;
        }

        div.addEventListener('click', () => openLightbox(idx));
        gallery.appendChild(div);
      });
    }

    // Filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const f = btn.dataset.filter;
        filteredItems = f === 'all' ? [...allItems] : allItems.filter(i => f === 'video' ? i.resource_type === 'video' : i.resource_type !== 'video');
        renderGallery(filteredItems);
      });
    });

    // Lightbox
    function openLightbox(idx) {
      currentIdx = idx;
      renderLbItem();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      lbWrap.innerHTML = '';
    }

    function renderLbItem() {
      lbWrap.innerHTML = '';
      const item = filteredItems[currentIdx];
      if (item.resource_type === 'video') {
        const v = document.createElement('video');
        v.src = item.url; v.controls = true; v.autoplay = true; v.playsInline = true;
        lbWrap.appendChild(v);
      } else {
        const img = document.createElement('img');
        img.src = item.url.replace('/upload/', '/upload/w_1200,q_auto,f_auto/');
        img.alt = 'Foto';
        lbWrap.appendChild(img);
      }
      lbUploader.textContent = item.uploader_name || 'Anonim';
      lbCounter.textContent = `${currentIdx + 1} / ${filteredItems.length}`;
    }

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.getElementById('lb-prev').addEventListener('click', () => { currentIdx = (currentIdx - 1 + filteredItems.length) % filteredItems.length; renderLbItem(); });
    document.getElementById('lb-next').addEventListener('click', () => { currentIdx = (currentIdx + 1) % filteredItems.length; renderLbItem(); });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') document.getElementById('lb-prev').click();
      if (e.key === 'ArrowRight') document.getElementById('lb-next').click();
    });

    let tx = 0;
    lightbox.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
    lightbox.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tx;
      if (Math.abs(dx) > 50) dx < 0 ? document.getElementById('lb-next').click() : document.getElementById('lb-prev').click();
    });

    function fmtDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('ro-RO', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function esc(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    (async () => {
      allItems = await fetchPhotos();
      filteredItems = [...allItems];
      loading.style.display = 'none';
      renderGallery(filteredItems);
    })();
  </script>
</body>
</html>
